<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <title>NavBharat-AI</title>

  <link rel="stylesheet" href="style.css">

  <link rel="preconnect" href="https://fonts.googleapis.com">

  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
</head>

<body>

  <div class="container">

    <div class="topbar">

      <div>
        <h1>NavBharat-AI</h1>
        <p>Future of Intelligent Bharat</p>
      </div>

      <button id="themeBtn">
        🌙
      </button>

    </div>

    <div id="chatBox" class="chat-box"></div>

    <div class="input-area">

      <input
        type="text"
        id="userInput"
        placeholder="Message NavBharat-AI..."
        autocomplete="off"
      >

      <button id="sendBtn">
        Send
      </button>

    </div>

  </div>

  <footer>
    ✨ Developed by Abhinav Soni ✨
  </footer>

  <script src="script.js"></script>

</body>

</html>
